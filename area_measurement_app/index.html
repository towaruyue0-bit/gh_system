<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>図面 面積測定ツール</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== ヘッダー ===== */
    header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #e94560;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.2rem;
      color: #fff;
      font-weight: 700;
    }
    header h1 span { color: #e94560; }

    /* ===== メインレイアウト ===== */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== 左パネル ===== */
    .sidebar {
      width: 280px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .panel {
      border-bottom: 1px solid #0f3460;
      padding: 14px;
    }
    .panel-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* ===== ファイル ===== */
    .upload-area {
      border: 2px dashed #0f3460;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #0d1b2a;
    }
    .upload-area:hover { border-color: #e94560; background: #1a2a40; }
    .upload-area input { display: none; }
    .upload-area .icon { font-size: 2rem; margin-bottom: 6px; }
    .upload-area p { font-size: 0.8rem; color: #888; }

    /* ===== ページ操作 ===== */
    .page-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-controls button {
      background: #0f3460;
      border: none;
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    .page-controls button:hover { background: #e94560; }
    .page-controls span { font-size: 0.85rem; color: #aaa; flex: 1; text-align: center; }

    /* ===== ズーム ===== */
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .zoom-controls button {
      background: #0f3460;
      border: none;
      color: #fff;
      width: 28px; height: 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .zoom-controls button:hover { background: #e94560; }
    .zoom-controls span { font-size: 0.85rem; color: #aaa; flex: 1; text-align: center; }

    /* ===== モード選択 ===== */
    .mode-btn {
      width: 100%;
      padding: 9px;
      margin-bottom: 6px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #0d1b2a;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .mode-btn:hover { background: #1a2a40; border-color: #e94560; }
    .mode-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    .mode-btn .badge {
      margin-left: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 0.7rem;
    }

    /* ===== スケール入力 ===== */
    .scale-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }
    .scale-input-row input {
      flex: 1;
      background: #0d1b2a;
      border: 1px solid #0f3460;
      color: #fff;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .scale-input-row input:focus { outline: none; border-color: #e94560; }
    .scale-input-row label { font-size: 0.8rem; color: #888; white-space: nowrap; }
    .scale-status {
      font-size: 0.78rem;
      margin-top: 6px;
      padding: 6px;
      border-radius: 4px;
      background: #0d1b2a;
    }
    .scale-status.ok { color: #4caf50; border: 1px solid #4caf50; }
    .scale-status.pending { color: #ff9800; border: 1px solid #ff9800; }

    /* ===== エリア一覧 ===== */
    .area-item {
      background: #0d1b2a;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .area-item:hover { border-color: #e94560; }
    .area-item.selected { border-color: #e94560; background: #1a0d1a; }
    .area-item-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .area-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .area-name {
      font-size: 0.82rem;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .area-del {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 2px;
    }
    .area-del:hover { color: #e94560; }
    .area-values {
      font-size: 0.78rem;
      color: #aaa;
    }
    .area-values strong { color: #4fc3f7; }

    /* ===== 合計 ===== */
    .total-box {
      background: linear-gradient(135deg, #0f3460, #16213e);
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .total-box .label { font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
    .total-box .value { font-size: 1.4rem; font-weight: 700; color: #e94560; }
    .total-box .sub { font-size: 0.85rem; color: #aaa; margin-top: 2px; }

    /* ===== ボタン ===== */
    .btn {
      background: #0f3460;
      border: none;
      color: #fff;
      padding: 7px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #1a5080; }
    .btn.danger { background: #5c1a1a; }
    .btn.danger:hover { background: #8b2020; }
    .btn.success { background: #1a4a1a; }
    .btn.success:hover { background: #2a6a2a; }

    /* ===== キャンバスエリア ===== */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .canvas-toolbar {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      font-size: 0.82rem;
      color: #888;
    }
    .canvas-toolbar .tip {
      color: #ff9800;
      font-size: 0.78rem;
    }

    .canvas-viewport {
      flex: 1;
      overflow: auto;
      background: #111;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }
    .canvas-wrapper {
      position: relative;
      display: inline-block;
      margin: 20px;
    }
    #pdf-canvas {
      display: block;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    #overlay-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: all;
    }

    /* ===== ツールチップ / ポップアップ ===== */
    .measure-popup {
      position: fixed;
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      pointer-events: none;
      z-index: 1000;
      display: none;
      min-width: 140px;
      backdrop-filter: blur(4px);
    }
    .measure-popup .area-m2 { font-size: 1.1rem; font-weight: 700; color: #4fc3f7; }
    .measure-popup .area-tsubo { color: #aaa; margin-top: 2px; }

    /* ===== 色選択 ===== */
    .color-picker-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .color-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s;
    }
    .color-dot:hover { transform: scale(1.2); }
    .color-dot.selected { border-color: #fff; }

    /* ===== 名前入力 ===== */
    .name-input {
      width: 100%;
      background: #0d1b2a;
      border: 1px solid #0f3460;
      color: #fff;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 0.82rem;
      margin-top: 6px;
    }
    .name-input:focus { outline: none; border-color: #e94560; }

    /* ===== エクスポート ===== */
    .export-section {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ===== レスポンシブ ===== */
    @media (max-width: 700px) {
      .sidebar { width: 220px; }
    }

    /* ===== アニメーション ===== */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .recording { animation: pulse 1s infinite; }
  </style>
</head>
<body>

<header>
  <h1>📐 図面 <span>面積測定</span>ツール</h1>
  <small style="color:#888; margin-left:auto;">クリックで範囲を選択 → m² と 坪 を自動計算</small>
</header>

<div class="main">
  <!-- ===== 左サイドバー ===== -->
  <div class="sidebar">

    <!-- ファイル読込 -->
    <div class="panel">
      <div class="panel-title">📄 図面ファイル</div>
      <label class="upload-area" id="upload-label">
        <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.gif,.bmp,.webp">
        <div class="icon">📂</div>
        <p>PDFまたは画像をクリックして読込</p>
        <p style="margin-top:4px; color:#555;">（ドラッグ&ドロップも可）</p>
      </label>

      <!-- ページ操作 (PDF用) -->
      <div id="page-panel" style="display:none; margin-top:10px;">
        <div class="panel-title" style="margin-bottom:6px;">ページ</div>
        <div class="page-controls">
          <button onclick="changePage(-1)">◀</button>
          <span id="page-info">1 / 1</span>
          <button onclick="changePage(1)">▶</button>
        </div>
      </div>

      <!-- ズーム -->
      <div style="margin-top:10px;" id="zoom-panel" style="display:none;">
        <div class="panel-title" style="margin-bottom:6px;">ズーム</div>
        <div class="zoom-controls">
          <button onclick="changeZoom(-0.25)">−</button>
          <span id="zoom-info">100%</span>
          <button onclick="changeZoom(0.25)">＋</button>
          <button onclick="changeZoom(0)" title="リセット" style="font-size:0.7rem; width:auto; padding:0 6px;">FIT</button>
        </div>
      </div>
    </div>

    <!-- スケール設定 -->
    <div class="panel">
      <div class="panel-title">📏 スケール設定</div>
      <button class="mode-btn" id="btn-scale" onclick="setMode('scale')">
        📍 2点を指定してスケール設定
      </button>
      <div class="scale-input-row">
        <input type="number" id="scale-distance" value="10" min="0.01" step="0.1" placeholder="実距離">
        <label>m</label>
      </div>
      <div class="scale-status pending" id="scale-status">
        ⚠ スケール未設定（面積は計算できません）
      </div>
    </div>

    <!-- 測定モード -->
    <div class="panel">
      <div class="panel-title">✏ 測定エリア</div>

      <!-- 名前・色 -->
      <div style="margin-bottom:8px;">
        <label style="font-size:0.75rem; color:#888;">エリア名</label>
        <input class="name-input" id="new-area-name" value="エリア1" placeholder="エリア名を入力">
        <div class="color-picker-row" id="color-picker">
          <!-- JS で生成 -->
        </div>
      </div>

      <button class="mode-btn" id="btn-polygon" onclick="setMode('polygon')">
        🖊 多角形で範囲を描く
        <span class="badge">推奨</span>
      </button>
      <button class="mode-btn" id="btn-rect" onclick="setMode('rect')">
        ⬜ 矩形（長方形）で描く
      </button>

      <div style="font-size:0.75rem; color:#888; margin-top:4px;">
        多角形: 左クリックで頂点追加 → ダブルクリックまたは始点クリックで確定<br>
        矩形: ドラッグで描画
      </div>

      <button class="mode-btn" style="margin-top:8px; color:#aaa;" id="btn-select" onclick="setMode('select')">
        🖱 選択・移動モード
      </button>
    </div>

    <!-- エリア一覧 -->
    <div class="panel" style="flex:1;">
      <div class="panel-title">📊 測定エリア一覧</div>
      <div id="area-list">
        <div style="color:#555; font-size:0.8rem; text-align:center; padding:16px;">
          エリアはまだありません
        </div>
      </div>
    </div>

    <!-- 合計 -->
    <div class="panel">
      <div class="panel-title">🧮 合計面積</div>
      <div class="total-box">
        <div class="label">すべてのエリア合計</div>
        <div class="value" id="total-m2">—</div>
        <div class="sub" id="total-tsubo">—</div>
      </div>
    </div>

    <!-- エクスポート -->
    <div class="panel">
      <div class="panel-title">💾 エクスポート</div>
      <div class="export-section">
        <button class="btn success" onclick="exportCSV()">CSV</button>
        <button class="btn success" onclick="exportImage()">画像</button>
        <button class="btn" onclick="clearAll()">全消去</button>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- ===== キャンバスエリア ===== -->
  <div class="canvas-area">
    <div class="canvas-toolbar">
      <span id="mode-label">モード: <strong>—</strong></span>
      <span style="margin-left:auto;" class="tip" id="toolbar-tip">
        まずPDF/画像を読み込んでください
      </span>
    </div>
    <div class="canvas-viewport" id="viewport">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- ポップアップ -->
<div class="measure-popup" id="measure-popup">
  <div class="area-m2" id="popup-m2">—</div>
  <div class="area-tsubo" id="popup-tsubo">—</div>
</div>

<script>
// ===== PDF.js 設定 =====
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ===== 状態 =====
let pdfDoc = null;
let currentPage = 1;
let totalPages = 1;
let zoom = 1.0;
let baseScale = 1.5; // PDF → canvas 解像度倍率
let imgEl = null; // 画像モード用

let mode = 'select'; // 'scale' | 'polygon' | 'rect' | 'select'
let scalePixels = null; // スケール設定: 図面上のピクセル距離
let scaleMeters = 10.0; // スケール設定: 対応する実際のメートル

let areas = []; // 測定済みエリア
let selectedAreaIdx = -1;
let selectedColor = '#e94560';
let nextAreaNum = 1;

// 描画中の状態
let drawing = {
  active: false,
  points: [], // polygon
  startX: 0, startY: 0, curX: 0, curY: 0, // rect
};
// スケール設定中
let scaleDraw = { active: false, p1: null, p2: null };

// ===== DOM =====
const pdfCanvas   = document.getElementById('pdf-canvas');
const overlay     = document.getElementById('overlay-canvas');
const ctx         = pdfCanvas.getContext('2d');
const octx        = overlay.getContext('2d');
const viewport    = document.getElementById('viewport');
const wrapper     = document.getElementById('canvas-wrapper');

// ===== 色パレット =====
const COLORS = [
  '#e94560','#4fc3f7','#66bb6a','#ffa726','#ab47bc',
  '#26c6da','#d4e157','#ff7043','#42a5f5','#ef5350'
];
(function buildColorPicker() {
  const cp = document.getElementById('color-picker');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => {
      selectedColor = c;
      document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('selected'));
      d.classList.add('selected');
    };
    cp.appendChild(d);
  });
})();

// ===== ファイル読込 =====
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

// ドラッグ&ドロップ
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

async function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') {
    const ab = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;
    imgEl = null;
    document.getElementById('page-panel').style.display = 'block';
    document.getElementById('zoom-panel').style.display = 'block';
    await renderPdfPage();
  } else {
    // 画像
    pdfDoc = null;
    imgEl = new Image();
    imgEl.onload = () => {
      pdfCanvas.width = imgEl.naturalWidth * zoom;
      pdfCanvas.height = imgEl.naturalHeight * zoom;
      overlay.width = pdfCanvas.width;
      overlay.height = pdfCanvas.height;
      ctx.drawImage(imgEl, 0, 0, pdfCanvas.width, pdfCanvas.height);
      document.getElementById('page-panel').style.display = 'none';
      document.getElementById('zoom-panel').style.display = 'block';
      redrawOverlay();
      updateToolbarTip();
    };
    imgEl.src = URL.createObjectURL(file);
  }

  document.getElementById('upload-label').style.background = '#0d1b2a';
  document.getElementById('toolbar-tip').textContent = '✅ ファイル読込完了';
  setMode('select');
}

async function renderPdfPage() {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(currentPage);
  const vp = page.getViewport({ scale: baseScale * zoom });
  pdfCanvas.width = vp.width;
  pdfCanvas.height = vp.height;
  overlay.width = vp.width;
  overlay.height = vp.height;
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
  redrawOverlay();
  updateToolbarTip();
}

function changePage(dir) {
  if (!pdfDoc) return;
  if (dir === 0) { currentPage = 1; }
  else {
    currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
  }
  renderPdfPage();
}

function changeZoom(delta) {
  if (delta === 0) { zoom = 1.0; }
  else { zoom = Math.max(0.25, Math.min(5.0, zoom + delta)); }
  document.getElementById('zoom-info').textContent = Math.round(zoom * 100) + '%';
  // 既存エリア座標をそのままに（座標はcanvasピクセル基準のため再スケールは不要）
  if (pdfDoc) renderPdfPage();
  else if (imgEl) {
    pdfCanvas.width = imgEl.naturalWidth * zoom;
    pdfCanvas.height = imgEl.naturalHeight * zoom;
    overlay.width = pdfCanvas.width;
    overlay.height = pdfCanvas.height;
    ctx.drawImage(imgEl, 0, 0, pdfCanvas.width, pdfCanvas.height);
    redrawOverlay();
  }
}

// ===== モード =====
function setMode(m) {
  mode = m;
  drawing.active = false;
  drawing.points = [];
  scaleDraw.active = false;
  scaleDraw.p1 = null;
  scaleDraw.p2 = null;

  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  const map = { scale:'btn-scale', polygon:'btn-polygon', rect:'btn-rect', select:'btn-select' };
  if (map[m]) document.getElementById(map[m]).classList.add('active');

  updateToolbarTip();
  redrawOverlay();
}

function updateToolbarTip() {
  const tips = {
    scale:   '📍 2点をクリックしてスケールを設定してください',
    polygon: '🖊 左クリックで頂点を追加、ダブルクリック or 始点クリックで確定',
    rect:    '⬜ ドラッグして矩形エリアを描いてください',
    select:  '🖱 エリアをクリックして選択・確認できます',
  };
  const labels = { scale:'スケール設定', polygon:'多角形描画', rect:'矩形描画', select:'選択モード' };
  document.getElementById('mode-label').innerHTML =
    `モード: <strong>${labels[mode] || '—'}</strong>`;
  document.getElementById('toolbar-tip').textContent = tips[mode] || '';
}

// ===== Canvas 座標取得 =====
function getCanvasPos(e) {
  const rect = overlay.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (overlay.width / rect.width),
    y: (e.clientY - rect.top)  * (overlay.height / rect.height),
  };
}

// ===== イベント =====
overlay.addEventListener('mousedown', onMouseDown);
overlay.addEventListener('mousemove', onMouseMove);
overlay.addEventListener('mouseup',   onMouseUp);
overlay.addEventListener('dblclick',  onDblClick);
overlay.addEventListener('click',     onClick);

let rectDragging = false;

function onMouseDown(e) {
  if (e.button !== 0) return;
  const p = getCanvasPos(e);

  if (mode === 'rect') {
    rectDragging = true;
    drawing.active = true;
    drawing.startX = p.x; drawing.startY = p.y;
    drawing.curX = p.x;   drawing.curY = p.y;
  }
}

function onMouseMove(e) {
  const p = getCanvasPos(e);

  if (mode === 'polygon' && drawing.active) {
    drawing.curX = p.x; drawing.curY = p.y;
    redrawOverlay();
  }
  if (mode === 'rect' && rectDragging) {
    drawing.curX = p.x; drawing.curY = p.y;
    redrawOverlay();
  }
  if (mode === 'scale' && scaleDraw.active && scaleDraw.p1) {
    scaleDraw.p2 = p;
    redrawOverlay();
  }

  // リアルタイム面積表示（多角形途中）
  if (mode === 'polygon' && drawing.active && drawing.points.length >= 2) {
    const tmp = [...drawing.points, p];
    const area = calcPolygonArea(tmp);
    showPopup(e.clientX, e.clientY, area);
  } else {
    hidePopup();
  }

  // カーソル変更
  if (mode === 'polygon' && drawing.active && drawing.points.length > 2) {
    const d = dist(p, drawing.points[0]);
    overlay.style.cursor = d < 12 ? 'cell' : 'crosshair';
  } else if (mode === 'polygon' || mode === 'rect' || mode === 'scale') {
    overlay.style.cursor = 'crosshair';
  } else {
    overlay.style.cursor = 'default';
  }
}

function onMouseUp(e) {
  if (mode === 'rect' && rectDragging) {
    rectDragging = false;
    drawing.active = false;
    const p = getCanvasPos(e);
    const pts = rectPoints(drawing.startX, drawing.startY, p.x, p.y);
    if (Math.abs(p.x - drawing.startX) > 4 && Math.abs(p.y - drawing.startY) > 4) {
      addArea(pts);
    }
    drawing.points = [];
    redrawOverlay();
  }
}

function onClick(e) {
  const p = getCanvasPos(e);

  if (mode === 'scale') {
    if (!scaleDraw.active) {
      scaleDraw.active = true;
      scaleDraw.p1 = p;
      scaleDraw.p2 = null;
    } else {
      scaleDraw.p2 = p;
      const dx = p.x - scaleDraw.p1.x;
      const dy = p.y - scaleDraw.p1.y;
      scalePixels = Math.sqrt(dx*dx + dy*dy);
      scaleMeters = parseFloat(document.getElementById('scale-distance').value) || 10;
      const status = document.getElementById('scale-status');
      status.className = 'scale-status ok';
      status.textContent = `✅ スケール設定完了: ${scalePixels.toFixed(1)}px = ${scaleMeters}m`;
      scaleDraw.active = false;
      scaleDraw.p1 = null;
      scaleDraw.p2 = null;
      redrawOverlay();
      setMode('polygon');
    }
    return;
  }

  if (mode === 'polygon') {
    if (!drawing.active) {
      drawing.active = true;
      drawing.points = [];
    }
    // 始点に近い場合は確定
    if (drawing.points.length > 2) {
      const d = dist(p, drawing.points[0]);
      if (d < 12) {
        finalizePolygon();
        return;
      }
    }
    drawing.points.push(p);
    drawing.curX = p.x; drawing.curY = p.y;
    redrawOverlay();
    return;
  }

  if (mode === 'select') {
    // エリアを選択
    const idx = hitTestArea(p);
    selectedAreaIdx = idx;
    renderAreaList();
    redrawOverlay();
  }
}

function onDblClick(e) {
  if (mode === 'polygon' && drawing.active && drawing.points.length >= 3) {
    finalizePolygon();
  }
}

// ===== 多角形確定 =====
function finalizePolygon() {
  if (drawing.points.length < 3) return;
  addArea([...drawing.points]);
  drawing.active = false;
  drawing.points = [];
  redrawOverlay();
}

function addArea(points) {
  const name = document.getElementById('new-area-name').value || `エリア${nextAreaNum}`;
  areas.push({ points, color: selectedColor, name });
  nextAreaNum++;
  // 次のエリア名を自動インクリメント
  document.getElementById('new-area-name').value = `エリア${nextAreaNum}`;
  selectedAreaIdx = areas.length - 1;
  renderAreaList();
  updateTotal();
  redrawOverlay();
}

function deleteArea(idx) {
  areas.splice(idx, 1);
  if (selectedAreaIdx >= areas.length) selectedAreaIdx = areas.length - 1;
  renderAreaList();
  updateTotal();
  redrawOverlay();
}

// ===== ヒットテスト =====
function hitTestArea(p) {
  for (let i = areas.length - 1; i >= 0; i--) {
    if (pointInPolygon(p, areas[i].points)) return i;
  }
  return -1;
}

// ===== 面積計算 =====
function calcPolygonArea(pts) {
  // Shoelace formula (ピクセル面積)
  let s = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    s += pts[i].x * pts[j].y;
    s -= pts[j].x * pts[i].y;
  }
  return Math.abs(s) / 2;
}

function pixToM2(pxArea) {
  if (!scalePixels) return null;
  const mPerPx = scaleMeters / scalePixels;
  return pxArea * mPerPx * mPerPx;
}

function m2ToTsubo(m2) { return m2 / 3.305785; }

// ===== UI更新 =====
function renderAreaList() {
  const list = document.getElementById('area-list');
  if (areas.length === 0) {
    list.innerHTML = '<div style="color:#555;font-size:0.8rem;text-align:center;padding:16px;">エリアはまだありません</div>';
    return;
  }
  list.innerHTML = '';
  areas.forEach((a, i) => {
    const pxArea = calcPolygonArea(a.points);
    const m2 = pixToM2(pxArea);
    const el = document.createElement('div');
    el.className = 'area-item' + (i === selectedAreaIdx ? ' selected' : '');
    el.onclick = () => { selectedAreaIdx = i; renderAreaList(); redrawOverlay(); };
    el.innerHTML = `
      <div class="area-item-header">
        <div class="area-dot" style="background:${a.color}"></div>
        <div class="area-name" title="${a.name}">${a.name}</div>
        <button class="area-del" onclick="event.stopPropagation();deleteArea(${i})">✕</button>
      </div>
      <div class="area-values">
        ${m2 !== null
          ? `<strong>${m2.toFixed(2)} m²</strong> / ${m2ToTsubo(m2).toFixed(2)} 坪`
          : '<span style="color:#ff9800;">スケール未設定</span>'}
      </div>`;
    list.appendChild(el);
  });
}

function updateTotal() {
  let totalM2 = 0;
  let hasScale = scalePixels !== null;
  areas.forEach(a => {
    const px = calcPolygonArea(a.points);
    const m2 = pixToM2(px);
    if (m2 !== null) totalM2 += m2;
  });
  if (hasScale && areas.length > 0) {
    document.getElementById('total-m2').textContent = totalM2.toFixed(2) + ' m²';
    document.getElementById('total-tsubo').textContent = m2ToTsubo(totalM2).toFixed(2) + ' 坪';
  } else {
    document.getElementById('total-m2').textContent = '—';
    document.getElementById('total-tsubo').textContent = areas.length > 0 ? 'スケールを設定してください' : '—';
  }
}

// ===== 描画 =====
function redrawOverlay() {
  octx.clearRect(0, 0, overlay.width, overlay.height);

  // 確定エリア
  areas.forEach((a, i) => {
    drawPolygon(a.points, a.color, i === selectedAreaIdx);
  });

  // 描画中（polygon）
  if (mode === 'polygon' && drawing.active && drawing.points.length > 0) {
    octx.beginPath();
    octx.moveTo(drawing.points[0].x, drawing.points[0].y);
    drawing.points.forEach(p => octx.lineTo(p.x, p.y));
    octx.lineTo(drawing.curX, drawing.curY);
    octx.strokeStyle = 'rgba(255,255,255,0.8)';
    octx.lineWidth = 2;
    octx.setLineDash([5,4]);
    octx.stroke();
    octx.setLineDash([]);

    // 頂点
    drawing.points.forEach((p, idx) => {
      octx.beginPath();
      octx.arc(p.x, p.y, idx === 0 ? 7 : 4, 0, Math.PI*2);
      octx.fillStyle = idx === 0 ? '#fff' : selectedColor;
      octx.fill();
    });
  }

  // 描画中（rect）
  if (mode === 'rect' && rectDragging) {
    const x = Math.min(drawing.startX, drawing.curX);
    const y = Math.min(drawing.startY, drawing.curY);
    const w = Math.abs(drawing.curX - drawing.startX);
    const h = Math.abs(drawing.curY - drawing.startY);
    octx.fillStyle = hexToRgba(selectedColor, 0.15);
    octx.fillRect(x, y, w, h);
    octx.strokeStyle = selectedColor;
    octx.lineWidth = 2;
    octx.setLineDash([5,4]);
    octx.strokeRect(x, y, w, h);
    octx.setLineDash([]);
  }

  // スケール線
  if (scaleDraw.p1) {
    const p2 = scaleDraw.p2 || scaleDraw.p1;
    octx.beginPath();
    octx.moveTo(scaleDraw.p1.x, scaleDraw.p1.y);
    octx.lineTo(p2.x, p2.y);
    octx.strokeStyle = '#ffd700';
    octx.lineWidth = 2;
    octx.setLineDash([6,3]);
    octx.stroke();
    octx.setLineDash([]);
    // 端点
    [scaleDraw.p1, p2].forEach(pt => {
      octx.beginPath();
      octx.arc(pt.x, pt.y, 5, 0, Math.PI*2);
      octx.fillStyle = '#ffd700';
      octx.fill();
    });
  }

  updateTotal();
}

function drawPolygon(pts, color, isSelected) {
  if (pts.length < 2) return;
  octx.beginPath();
  octx.moveTo(pts[0].x, pts[0].y);
  pts.forEach(p => octx.lineTo(p.x, p.y));
  octx.closePath();

  octx.fillStyle = hexToRgba(color, isSelected ? 0.35 : 0.2);
  octx.fill();
  octx.strokeStyle = color;
  octx.lineWidth = isSelected ? 3 : 2;
  octx.stroke();

  // ラベル
  const cx = pts.reduce((s,p)=>s+p.x,0)/pts.length;
  const cy = pts.reduce((s,p)=>s+p.y,0)/pts.length;
  const pxArea = calcPolygonArea(pts);
  const m2 = pixToM2(pxArea);
  const text = m2 !== null ? `${m2.toFixed(1)}㎡` : '?㎡';
  octx.font = 'bold 14px Meiryo, sans-serif';
  octx.textAlign = 'center';
  octx.textBaseline = 'middle';
  octx.fillStyle = 'rgba(0,0,0,0.6)';
  octx.fillText(text, cx+1, cy+1);
  octx.fillStyle = '#fff';
  octx.fillText(text, cx, cy);
}

// ===== ポップアップ =====
function showPopup(cx, cy, pxArea) {
  const popup = document.getElementById('measure-popup');
  const m2 = pixToM2(pxArea);
  if (m2 !== null) {
    document.getElementById('popup-m2').textContent = m2.toFixed(2) + ' m²';
    document.getElementById('popup-tsubo').textContent = m2ToTsubo(m2).toFixed(2) + ' 坪';
    popup.style.display = 'block';
    popup.style.left = (cx + 16) + 'px';
    popup.style.top  = (cy - 10) + 'px';
  }
}
function hidePopup() {
  document.getElementById('measure-popup').style.display = 'none';
}

// ===== エクスポート =====
function exportCSV() {
  if (areas.length === 0) { alert('エリアがありません'); return; }
  let csv = '名前,m²,坪,頂点数\n';
  areas.forEach(a => {
    const px = calcPolygonArea(a.points);
    const m2 = pixToM2(px);
    csv += `"${a.name}",${m2 !== null ? m2.toFixed(4) : ''},${m2 !== null ? m2ToTsubo(m2).toFixed(4) : ''},${a.points.length}\n`;
  });
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '面積計測結果.csv';
  a.click();
}

function exportImage() {
  if (!pdfCanvas.width) { alert('図面を読み込んでください'); return; }
  const out = document.createElement('canvas');
  out.width = pdfCanvas.width;
  out.height = pdfCanvas.height;
  const oc = out.getContext('2d');
  oc.drawImage(pdfCanvas, 0, 0);
  oc.drawImage(overlay, 0, 0);
  const a = document.createElement('a');
  a.href = out.toDataURL('image/png');
  a.download = '面積計測図面.png';
  a.click();
}

function clearAll() {
  if (!confirm('すべてのエリアを削除してよいですか？')) return;
  areas = [];
  selectedAreaIdx = -1;
  nextAreaNum = 1;
  document.getElementById('new-area-name').value = 'エリア1';
  renderAreaList();
  updateTotal();
  redrawOverlay();
}

// ===== ユーティリティ =====
function dist(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}
function rectPoints(x1,y1,x2,y2) {
  return [{x:x1,y:y1},{x:x2,y:y1},{x:x2,y:y2},{x:x1,y:y2}];
}
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function pointInPolygon(p, poly) {
  let inside = false;
  for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
    const xi=poly[i].x, yi=poly[i].y, xj=poly[j].x, yj=poly[j].y;
    if (((yi>p.y) !== (yj>p.y)) && (p.x < (xj-xi)*(p.y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// ===== スケール距離フィールド =====
document.getElementById('scale-distance').addEventListener('change', e => {
  scaleMeters = parseFloat(e.target.value) || 10;
  if (scalePixels) {
    const status = document.getElementById('scale-status');
    status.className = 'scale-status ok';
    status.textContent = `✅ スケール: ${scalePixels.toFixed(1)}px = ${scaleMeters}m`;
    renderAreaList();
    updateTotal();
    redrawOverlay();
  }
});
</script>
