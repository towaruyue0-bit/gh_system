<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>物件内覧チェック表</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:       #1D4ED8;
  --blue-light: #EFF6FF;
  --green:      #15803D;
  --green-bg:   #F0FDF4;
  --red:        #DC2626;
  --red-bg:     #FEF2F2;
  --yellow:     #D97706;
  --yellow-bg:  #FFFBEB;
  --gray:       #64748B;
  --border:     #E2E8F0;
  --radius:     12px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: #f0f4fb;
  font-size: 15px;
  color: #1a1a1a;
}
#wrap { max-width: 640px; margin: 0 auto; padding: 16px 14px 80px; }

/* ===== ヘッダー ===== */
.page-header {
  background: var(--blue);
  color: white;
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  text-align: center;
}
.page-header h1 { font-size: 20px; font-weight: 700; }
.page-header p  { font-size: 12px; opacity: 0.8; margin-top: 4px; }
#save-indicator {
  font-size: 11px;
  margin-top: 6px;
  opacity: 0.3;
  transition: opacity 0.5s;
  color: #a5f3d0;
  font-weight: 600;
  letter-spacing: 0.03em;
}

/* ===== 物件情報カード ===== */
.info-card {
  background: white;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.info-card h2 {
  font-size: 13px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 0.05em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--blue-light);
}
.info-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.info-row.full { grid-template-columns: 1fr; }
.info-label {
  font-size: 11px;
  color: var(--gray);
  margin-bottom: 3px;
  font-weight: 600;
}
.info-input {
  width: 100%;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: #fafafa;
  outline: none;
  transition: border-color 0.15s;
}
.info-input:focus { border-color: var(--blue); background: white; }

/* ===== セクション ===== */
.section {
  background: white;
  border-radius: var(--radius);
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: #fafcff;
  border-bottom: 1.5px solid var(--border);
}
.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
}
.section-icon { font-size: 18px; }
.section-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--border);
  color: var(--gray);
  margin-left: 4px;
}
.section-arrow {
  font-size: 18px;
  color: var(--gray);
  transition: transform 0.2s;
}
.section.open .section-arrow { transform: rotate(180deg); }
.section-body { display: none; padding: 0; }
.section.open .section-body { display: block; }

/* ===== チェック行 ===== */
.check-item {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
}
.check-item:last-child { border-bottom: none; }
.check-label {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
  line-height: 1.4;
}
.check-sub {
  font-size: 11px;
  color: var(--gray);
  margin-bottom: 8px;
}
.check-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.check-btn {
  flex: 1;
  min-width: 60px;
  padding: 7px 4px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  background: white;
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.12s;
}
.check-btn.ok    { border-color: #86EFAC; color: var(--green); background: #F0FDF4; }
.check-btn.ng    { border-color: #FCA5A5; color: var(--red);   background: #FEF2F2; }
.check-btn.warn  { border-color: #FCD34D; color: var(--yellow);background: #FFFBEB; }
.check-btn.note  { border-color: #93C5FD; color: var(--blue);  background: #EFF6FF; }
.check-btn.selected.ok   { background: var(--green); color: white; border-color: var(--green); }
.check-btn.selected.ng   { background: var(--red);   color: white; border-color: var(--red); }
.check-btn.selected.warn { background: var(--yellow);color: white; border-color: var(--yellow); }
.check-note-area {
  margin-top: 8px;
  width: 100%;
  padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: #fafafa;
  resize: vertical;
  min-height: 52px;
  display: none;
  outline: none;
  font-family: inherit;
}
.check-note-area.visible { display: block; }
.check-note-area:focus { border-color: var(--blue); background: white; }

/* ===== 部屋追加セクション ===== */
.room-item {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: #fffef8;
}
.room-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.room-label { font-size: 13px; font-weight: 700; color: #1a1a1a; }
.room-del-btn {
  padding: 3px 10px;
  border: 1px solid #FCA5A5;
  border-radius: 6px;
  color: var(--red);
  background: white;
  font-size: 12px;
  cursor: pointer;
}
.room-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}
.room-field label { font-size: 11px; color: var(--gray); display: block; margin-bottom: 2px; }
.room-field input {
  width: 100%;
  padding: 6px 8px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: #fafafa;
  outline: none;
}
.room-field input:focus { border-color: var(--blue); background: white; }
.room-area-display {
  font-size: 12px;
  color: var(--green);
  font-weight: 700;
  padding: 4px 0;
}
.room-area-display.ng { color: var(--red); }
.add-room-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 10px 16px;
  padding: 10px;
  background: var(--blue-light);
  color: var(--blue);
  border: 1.5px dashed #93C5FD;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}

/* ===== 総合評価 ===== */
.summary-card {
  background: white;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.summary-card h2 {
  font-size: 13px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 0.05em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--blue-light);
}
.eval-stars {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
}
.eval-star {
  font-size: 32px;
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.eval-star.active { opacity: 1; }
.eval-star:active { transform: scale(1.2); }
.summary-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: #fafafa;
  resize: vertical;
  min-height: 80px;
  outline: none;
  font-family: inherit;
}
.summary-textarea:focus { border-color: var(--blue); background: white; }

/* ===== ボタン ===== */
.print-btn {
  display: block;
  width: 100%;
  padding: 15px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  margin-bottom: 10px;
  -webkit-tap-highlight-color: transparent;
}
.reset-btn {
  display: block;
  width: 100%;
  padding: 12px;
  background: white;
  color: var(--gray);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}

/* ===== 印刷スタイル ===== */
@media print {
  @page { margin: 15mm 12mm; size: A4; }
  body { background: white; font-size: 12px; }
  #wrap { max-width: 100%; padding: 0; }
  .print-btn, .reset-btn, .add-room-btn, .room-del-btn { display: none !important; }
  .section { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  .section-body { display: block !important; }
  .section-arrow { display: none; }
  .info-card, .summary-card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  .check-note-area { display: block !important; }
  .info-input, .room-field input, .summary-textarea { background: white; border: 1px solid #ccc; }
  .page-header { background: var(--blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-btn.selected { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .section-header { background: #f0f4fb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #save-indicator { display: none; }
}
</style>
</head>
<body>
<div id="wrap">

<!-- ヘッダー -->
<div class="page-header">
  <h1>🏠 物件内覧チェック表</h1>
  <p>グループホーム物件 内覧用チェックリスト</p>
  <div id="save-indicator">✔ 自動保存済み</div>
</div>

<!-- 物件基本情報 -->
<div class="info-card">
  <h2>📍 物件基本情報</h2>
  <div class="info-row full">
    <div>
      <div class="info-label">物件名・所在地</div>
      <input class="info-input" type="text" id="addr" placeholder="例: 〇〇市〇〇町1-2-3">
    </div>
  </div>
  <div class="info-row">
    <div>
      <div class="info-label">内覧日</div>
      <input class="info-input" type="date" id="date">
    </div>
    <div>
      <div class="info-label">担当者名</div>
      <input class="info-input" type="text" id="person" placeholder="氏名">
    </div>
  </div>
  <div class="info-row">
    <div>
      <div class="info-label">築年数</div>
      <input class="info-input" type="text" id="age" placeholder="例: 築20年">
    </div>
    <div>
      <div class="info-label">建物構造</div>
      <input class="info-input" type="text" id="struct" placeholder="木造・RC・軽量鉄骨 等">
    </div>
  </div>
  <div class="info-row">
    <div>
      <div class="info-label">家賃・購入価格</div>
      <input class="info-input" type="text" id="price" placeholder="例: 月額12万円">
    </div>
    <div>
      <div class="info-label">延床面積</div>
      <input class="info-input" type="text" id="area" placeholder="例: 120㎡">
    </div>
  </div>
  <div class="info-row">
    <div>
      <div class="info-label">間取り</div>
      <input class="info-input" type="text" id="layout" placeholder="例: 4LDK">
    </div>
    <div>
      <div class="info-label">想定定員</div>
      <input class="info-input" type="text" id="capacity" placeholder="例: 4名">
    </div>
  </div>
</div>

<!-- ===== 1. 立地・周辺環境 ===== -->
<div class="section open" id="s1">
  <div class="section-header" onclick="toggleSection('s1')">
    <div class="section-title">
      <span class="section-icon">🗺</span>立地・周辺環境
    </div>
    <span class="section-arrow">⌄</span>
  </div>
  <div class="section-body">
    <!-- items -->
  </div>
</div>

<!-- ===== 2. 外観・建物全体 ===== -->
<div class="section" id="s2">
  <div class="section-header" onclick="toggleSection('s2')">
    <div class="section-title"><span class="section-icon">🏗</span>外観・建物全体</div>
    <span class="section-arrow">⌄</span>
  </div>
  <div class="section-body"></div>
</div>

<!-- ===== 3. 共用スペース ===== -->
<div class="section" id="s3">
  <div class="section-header" onclick="toggleSection('s3')">
    <div class="section-title"><span class="section-icon">🛋</span>共用スペース</div>
    <span class="section-arrow">⌄</span>
  </div>
  <div class="section-body"></div>
</div>

<!-- ===== 4. 居室確認 ===== -->
<div class="section" id="s4">
  <div class="section-header" onclick="toggleSection('s4')">
    <div class="section-title"><span class="section-icon">🚪</span>居室確認</div>
    <span class="section-arrow">⌄</span>
  </div>
  <div class="section-body"></div>
</div>

<!-- ===== 5. バリアフリー ===== -->
<div class="section" id="s5">
  <div class="section-header" onclick="toggleSection('s5')">
    <div class="section-title"><span class="section-icon">♿</span>バリアフリー・安全</div>
    <span class="section-arrow">⌄</span>
  </div>
  <div class="section-body"></div>
</div>

<!-- ===== 6. 設備・設備系統 ===== -->
<div class="section" id="s6">
  <div class="section-header" onclick="toggleSection('s6')">
    <div class="section-title"><span class="section-icon">🔧</span>設備・インフラ</div>
    <span class="section-arrow">⌄</span>
  </div>
  <div class="section-body"></div>
</div>

<!-- ===== 7. 安全・防災 ===== -->
<div class="section" id="s7">
  <div class="section-header" onclick="toggleSection('s7')">
    <div class="section-title"><span class="section-icon">🔥</span>防災・安全設備</div>
    <span class="section-arrow">⌄</span>
  </div>
  <div class="section-body"></div>
</div>

<!-- ===== 9. 不動産屋への聞き取り ===== -->
<div class="section" id="s9">
  <div class="section-header" onclick="toggleSection('s9')">
    <div class="section-title"><span class="section-icon">🗣</span>不動産屋への聞き取り確認</div>
    <span class="section-arrow">⌄</span>
  </div>
  <div class="section-body"></div>
</div>

<!-- ===== 総合評価 ===== -->
<div class="summary-card">
  <h2>⭐ 総合評価・メモ</h2>
  <div style="text-align:center; margin-bottom:8px; font-size:13px; color:var(--gray);">総合評価（タップで選択）</div>
  <div class="eval-stars">
    <span class="eval-star" onclick="setStars(1)">★</span>
    <span class="eval-star" onclick="setStars(2)">★</span>
    <span class="eval-star" onclick="setStars(3)">★</span>
    <span class="eval-star" onclick="setStars(4)">★</span>
    <span class="eval-star" onclick="setStars(5)">★</span>
  </div>
  <div class="info-label" style="margin-bottom:6px;">総合コメント・所感</div>
  <textarea class="summary-textarea" id="summaryNote" placeholder="物件全体の印象・懸念点・追加確認事項などを自由に記入してください"></textarea>
</div>

<!-- 操作ボタン -->
<button class="print-btn" onclick="printCheck()">🖨 PDF・印刷する</button>
<button class="reset-btn" onclick="resetAll()">🔄 リセット（チェックをすべてクリア・保存データ削除）</button>

</div><!-- /wrap -->

<script>
// ===================================================
// チェックデータ定義
// ===================================================
const SECTIONS = {
  s1: {
    items: [
      { id: "loc_env",     label: "周辺環境（騒音・臭い・治安）", sub: "住宅地として落ち着いた環境か。実際に現地で感じた印象を記録" },
      { id: "loc_park",    label: "駐車スペース", sub: "スタッフ・送迎車が停められる台数か" },
      { id: "loc_road",    label: "道路状況・接道", sub: "救急車・福祉車両が入れる道路幅か" },
      { id: "loc_neigh",   label: "隣接施設・近隣", sub: "隣に何があるか。工場・風俗・騒音源などがないか目視確認" },
    ]
  },
  s2: {
    items: [
      { id: "ext_cond",    label: "建物外観の状態", sub: "外壁のひび割れ・塗装の剥がれ・雨染みなど" },
      { id: "ext_roof",    label: "屋根・雨どいの状態", sub: "破損・詰まりなどの確認" },
      { id: "ext_base",    label: "基礎・土台の状態", sub: "ひび割れ・傾きがないか" },
      { id: "ext_entry",   label: "玄関アプローチ", sub: "段差・すべり・明るさは適切か" },
      { id: "ext_garage",  label: "駐車場・外構", sub: "駐車しやすいか、外構の状態は良好か" },
      { id: "ext_fence",   label: "フェンス・塀・庭", sub: "修繕が必要な箇所がないか" },
    ]
  },
  s3: {
    items: [
      { id: "com_hall",    label: "玄関・廊下の広さ", sub: "車いす通行や複数人の出入りに対応できるか（廊下幅80cm以上推奨）" },
      { id: "com_camera",  label: "廊下への見守りカメラ設置の可否", sub: "設置できる位置・高さがあるか。電源（コンセント）が近くにあるか確認" },
      { id: "com_hallout", label: "廊下のコンセント位置・数", sub: "カメラ・センサー等を設置したい箇所の近くにコンセントがあるか" },
      { id: "com_living",  label: "リビング・ダイニングの広さ", sub: "入居者全員が利用できる十分なスペースがあるか" },
      { id: "com_kitchen", label: "キッチンの状態・広さ", sub: "調理・片付けができる設備があるか" },
      { id: "com_bath",    label: "浴室の広さ・状態", sub: "介助が必要な場合に対応できる広さか（要介護対応）" },
      { id: "com_wash",    label: "洗面所の広さ・数", sub: "複数の入居者が使用できる状態か" },
      { id: "com_toilet",  label: "トイレの数・広さ", sub: "入居者数に対して十分な数があるか（2つ以上推奨）" },
      { id: "com_laundry", label: "洗濯機置き場", sub: "洗濯機・乾燥機の設置スペースがあるか" },
      { id: "com_storage", label: "共用収納・倉庫", sub: "備品・消耗品の保管場所があるか" },
    ]
  },
  s4: {
    items: [
      { id: "rm_size",    label: "各居室の広さ", sub: "GH基準: 1人あたり7.43㎡以上。各部屋の広さをメモ欄に記録しておく" },
      { id: "rm_window",  label: "窓の有無・数", sub: "各居室に窓があるか。採光・換気が確保できるか" },
      { id: "rm_outlet",  label: "コンセントの数・位置", sub: "家電・介護機器を考慮して十分な数があるか（2口×2箇所以上が目安）" },
      { id: "rm_tvline",  label: "テレビ線（アンテナ端子）の有無", sub: "各居室にテレビ端子があるか、または配線が引き込み可能か" },
      { id: "rm_storage", label: "収納スペース", sub: "クローゼット・押し入れなど個人の荷物が収まる収納があるか" },
      { id: "rm_cond",    label: "床・壁・天井の状態", sub: "シミ・カビ・破損・においなど。リフォーム費用の見積もりに影響" },
    ]
  },
  s5: {
    items: [
      { id: "bf_ramp",     label: "スロープ・段差解消", sub: "玄関・敷地入口に段差がある場合、スロープ設置が可能か" },
      { id: "bf_hallw",    label: "廊下幅", sub: "車いす通行には80cm以上必要。780mm未満の場合は要確認" },

// ===================================================
// 状態管理・自動保存
// ===================================================
const LS_KEY = 'nairan_check_v1';
const checkState = {};
let saveTimer = null;
let currentStars = 0;
let roomCount = 0;

function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 500);
}

function doSave() {
  const data = {
    info: {},
    checkState: Object.assign({}, checkState),
    notes: {},
    rooms: gatherRooms(),
    stars: currentStars,
    summaryNote: (document.getElementById('summaryNote') || {}).value || ''
  };
  ['addr','date','person','age','struct','price','area','layout','capacity'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) data.info[id] = el.value;
  });
  document.querySelectorAll('.check-note-area').forEach(function(el) {
    if (el.id && el.id.startsWith('note_')) {
      data.notes[el.id.slice(5)] = el.value;
    }
  });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  const ind = document.getElementById('save-indicator');
  if (ind) {
    ind.textContent = '✔ 自動保存済み';
    ind.style.opacity = '1';
    clearTimeout(ind._t);
    ind._t = setTimeout(function() { ind.style.opacity = '0.3'; }, 2000);
  }
}

function gatherRooms() {
  const rooms = [];
  for (let i = 1; i <= roomCount; i++) {
    const room = document.getElementById('room_' + i);
    if (!room) continue;
    const ni = room.querySelector('.room-name-input');
    const rl = document.getElementById('rl' + i);
    const rw = document.getElementById('rw' + i);
    const rs = document.getElementById('rs' + i);
    const nt = document.getElementById('note_rm' + i);
    rooms.push({
      name:  ni ? ni.value : '',
      l:     rl ? rl.value : '',
      w:     rw ? rw.value : '',
      s:     rs ? rs.value : '',
      check: checkState['rm' + i] || null,
      note:  nt ? nt.value : ''
    });
  }
  return rooms;
}

function loadSaved() {
  const raw = localStorage.getItem(LS_KEY);
  if (!raw) return;
  let data;
  try { data = JSON.parse(raw); } catch(e) { return; }

  // 物件情報
  if (data.info) {
    Object.keys(data.info).forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.value = data.info[id];
    });
  }

  // チェック状態（居室以外）
  if (data.checkState) {
    Object.assign(checkState, data.checkState);
    Object.keys(checkState).forEach(function(itemId) {
      const type = checkState[itemId];
      if (!type || itemId.startsWith('rm')) return;
      const noteEl = document.getElementById('note_' + itemId);
      if (!noteEl) return;
      const item = noteEl.closest('.check-item');
      if (!item) return;
      const btn = item.querySelector('.check-btn.' + type);
      if (btn) btn.classList.add('selected');
    });
  }

  // メモ
  if (data.notes) {
    Object.keys(data.notes).forEach(function(id) {
      const val = data.notes[id];
      if (!val) return;
      const el = document.getElementById('note_' + id);
      if (el) { el.value = val; el.classList.add('visible'); }
    });
  }

  // 星評価
  if (data.stars) setStars(data.stars);

  // 総合コメント
  if (data.summaryNote) {
    const el = document.getElementById('summaryNote');
    if (el) el.value = data.summaryNote;
  }

}

// ===================================================
// セクションにアイテムを描画
// ===================================================
function buildSections() {
  Object.keys(SECTIONS).forEach(function(secId) {
    const sec = SECTIONS[secId];
    const body = document.querySelector('#' + secId + ' .section-body');
    if (!body) return;
    sec.items.forEach(function(item) {
      body.appendChild(buildCheckItem(item));
    });
  });
}

function buildCheckItem(item) {
  const div = document.createElement('div');
  div.className = 'check-item';
  div.innerHTML =
    '<div class="check-label">' + item.label + '</div>' +
    (item.sub ? '<div class="check-sub">' + item.sub + '</div>' : '') +
    '<div class="check-btns">' +
      '<button class="check-btn ok"   onclick="selectBtn(this,\'ok\'  ,\'' + item.id + '\')">✅ 良好</button>' +
      '<button class="check-btn warn" onclick="selectBtn(this,\'warn\',\'' + item.id + '\')">⚠️ 要確認</button>' +
      '<button class="check-btn ng"   onclick="selectBtn(this,\'ng\'  ,\'' + item.id + '\')">❌ 問題あり</button>' +
      '<button class="check-btn note" onclick="toggleNote(\'' + item.id + '\')">📝 メモ</button>' +
    '</div>' +
    '<textarea class="check-note-area" id="note_' + item.id + '" placeholder="メモを入力..."></textarea>';
  div.querySelector('textarea').addEventListener('input', autoSave);
  return div;
}

// ===================================================
// トグル・選択
// ===================================================
function toggleSection(id) {
  document.getElementById(id).classList.toggle('open');
}

function selectBtn(btn, type, id) {
  const btns = btn.parentElement.querySelectorAll('.check-btn');
  const wasSelected = btn.classList.contains('selected');
  btns.forEach(function(b) { if (b !== btn) b.classList.remove('selected'); });
  btn.classList.toggle('selected');
  checkState[id] = wasSelected ? null : type;
  autoSave();
}

function toggleNote(id) {
  const area = document.getElementById('note_' + id);
  area.classList.toggle('visible');
  if (area.classList.contains('visible')) area.focus();
}

// ===================================================
// 居室追加
// ===================================================
function addRoom(savedName, savedL, savedW, savedS, savedCheck, savedNote) {
  roomCount++;
  const n = roomCount;
  const div = document.createElement('div');
  div.className = 'room-item';
  div.id = 'room_' + n;
  div.innerHTML =
    '<div class="room-header">' +
      '<div class="room-label">🚪 居室 ' + n + '（部屋番号・名称: <input class="room-name-input" style="width:80px;border:none;border-bottom:1px solid #ccc;font-size:13px;outline:none;" placeholder="例:洋室A">）</div>' +
      '<button class="room-del-btn" onclick="deleteRoom(' + n + ')">削除</button>' +
    '</div>' +
    '<div class="room-grid">' +
      '<div class="room-field"><label>縦（m）</label><input type="number" step="0.01" placeholder="例: 3.5" id="rl' + n + '" oninput="calcArea(' + n + ');autoSave()"></div>' +
      '<div class="room-field"><label>横（m）</label><input type="number" step="0.01" placeholder="例: 2.7" id="rw' + n + '" oninput="calcArea(' + n + ');autoSave()"></div>' +
      '<div class="room-field"><label>収納（㎡）</label><input type="number" step="0.01" placeholder="例: 0.5" id="rs' + n + '" oninput="calcArea(' + n + ');autoSave()"></div>' +
    '</div>' +
    '<div class="room-area-display" id="ra' + n + '">面積: 入力してください</div>' +
    '<div class="check-btns" style="margin-top:8px;">' +
      '<button class="check-btn ok"   onclick="selectBtn(this,\'ok\'  ,\'rm' + n + '\')">✅ 良好</button>' +
      '<button class="check-btn warn" onclick="selectBtn(this,\'warn\',\'rm' + n + '\')">⚠️ 要確認</button>' +
      '<button class="check-btn ng"   onclick="selectBtn(this,\'ng\'  ,\'rm' + n + '\')">❌ 問題あり</button>' +
      '<button class="check-btn note" onclick="toggleNote(\'rm' + n + '\')">📝 メモ</button>' +
    '</div>' +
    '<textarea class="check-note-area" id="note_rm' + n + '" placeholder="居室のメモ（採光・収納・状態など）"></textarea>';

  document.getElementById('roomList').appendChild(div);

  // 保存データを復元
  const ni = div.querySelector('.room-name-input');
  if (ni) {
    if (savedName) ni.value = savedName;
    ni.addEventListener('input', autoSave);
  }
  const rl = document.getElementById('rl' + n);
  const rw = document.getElementById('rw' + n);
  const rs = document.getElementById('rs' + n);
  if (rl && savedL) rl.value = savedL;
  if (rw && savedW) rw.value = savedW;
  if (rs && savedS) rs.value = savedS;
  if (savedL || savedW) calcArea(n);

  if (savedCheck) {
    checkState['rm' + n] = savedCheck;
    const btn = div.querySelector('.check-btn.' + savedCheck);
    if (btn) btn.classList.add('selected');
  }
  const noteEl = document.getElementById('note_rm' + n);
  if (noteEl) {
    if (savedNote) { noteEl.value = savedNote; noteEl.classList.add('visible'); }
    noteEl.addEventListener('input', autoSave);
  }
}

function deleteRoom(n) {
  const room = document.getElementById('room_' + n);
  if (room) room.remove();
  delete checkState['rm' + n];
  autoSave();
}

function calcArea(n) {
  const rl = document.getElementById('rl' + n);
  const rw = document.getElementById('rw' + n);
  const rs = document.getElementById('rs' + n);
  const el = document.getElementById('ra' + n);
  if (!el) return;
  const l = parseFloat(rl ? rl.value : '') || 0;
  const w = parseFloat(rw ? rw.value : '') || 0;
  const s = parseFloat(rs ? rs.value : '') || 0;
  if (l && w) {
    const gross = (l * w).toFixed(2);
    const net   = (l * w - s).toFixed(2);
    const ok743 = parseFloat(net) >= 7.43;
    el.className = 'room-area-display' + (ok743 ? '' : ' ng');
    el.textContent = '面積: ' + gross + '㎡（収納除く: ' + net + '㎡） → 基準(7.43㎡/人): ' + (ok743 ? '✅ OK' : '❌ 不足');
  } else {
    el.className = 'room-area-display';
    el.textContent = '面積: 入力してください';
  }
}

// ===================================================
// 星評価
// ===================================================
function setStars(n) {
  currentStars = n;
  document.querySelectorAll('.eval-star').forEach(function(s, i) {
    s.classList.toggle('active', i < n);
  });
  autoSave();
}

// ===================================================
// 印刷
// ===================================================
function printCheck() {
  document.querySelectorAll('.check-note-area').forEach(function(el) {
    if (el.value) el.classList.add('visible');
  });
  window.print();
}

// ===================================================
// リセット
// ===================================================
function resetAll() {
  if (!confirm('すべてのチェックをリセットしますか？\n（保存データも削除されます）')) return;
  document.querySelectorAll('.check-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.querySelectorAll('.check-note-area').forEach(function(a) { a.value = ''; a.classList.remove('visible'); });
  document.querySelectorAll('.info-input').forEach(function(i) { i.value = ''; });
  document.getElementById('summaryNote').value = '';
  Object.keys(checkState).forEach(function(k) { delete checkState[k]; });
  currentStars = 0;
  document.querySelectorAll('.eval-star').forEach(function(s) { s.classList.remove('active'); });
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  document.getElementById('date').valueAsDate = new Date();
}

// ===================================================
// 初期化
// ===================================================
buildSections();
document.getElementById('date').valueAsDate = new Date();

// 物件情報フィールドの自動保存
['addr','date','person','age','struct','price','area','layout','capacity'].forEach(function(id) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', autoSave);
});
document.getElementById('summaryNote').addEventListener('input', autoSave);

// 保存データを復元
loadSaved();
</script>
